<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            body {
                margin: 0px;
                height: 100vh;
                background-color: #eee;
            }

            .flex {
                display: flex;
            }

            .column {
                flex-direction: column;
            }

            .bcw {
                background-color: white;
            }

            .mgt8 {
                margin-top: 8px;
            }

            .mgr8 {
                margin-right: 8px;
            }

            .mgl8 {
                margin-left: 8px;
            }
        </style>
    </head>

    <body class="flex" style="overflow: hidden">
        <div style="width: 200px" class="bcw"></div>
        <div style="flex: 1" class="column flex">
            <div style="height: 60px" class="bcw"></div>
            <div style="flex: 1; overflow: auto" class="flex">
                <div style="flex: 3" class="flex column mgl8">
                    <div class="flex mgt8">
                        <div style="height: 100px; flex: 1" class="mgr8 bcw"></div>
                        <div style="height: 100px; flex: 1" class="mgr8 bcw"></div>
                        <div style="height: 100px; flex: 1" class="mgr8 bcw"></div>
                        <div style="height: 100px; flex: 1" class="mgr8 bcw"></div>
                    </div>

                    <div class="flex column">
                        <div style="height: 160px" class="bcw mgt8 mgr8"></div>
                        <div style="height: 160px" class="bcw mgt8 mgr8"></div>
                        <div style="height: 160px" class="bcw mgt8 mgr8"></div>
                        <div style="height: 160px" class="bcw mgt8 mgr8"></div>
                        <div style="height: 160px" class="bcw mgt8 mgr8"></div>
                        <div style="height: 160px" class="bcw mgt8 mgr8"></div>
                    </div>
                </div>
                <div style="flex: 1">
                    <div style="height: 160px" class="bcw mgt8"></div>
                    <div style="height: 300px" class="bcw mgt8"></div>
                </div>
            </div>
        </div>
    </body>
</html>
